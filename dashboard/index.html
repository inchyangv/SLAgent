<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLA-Pay v2 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
        .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9rem; }
        .controls { margin-bottom: 20px; display: flex; gap: 8px; align-items: center; }
        button { background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-size: 0.85rem; }
        button:hover { background: #16213e; border-color: #555; }
        button.active { background: #0f3460; border-color: #4a9eff; color: #4a9eff; }
        input { background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; width: 300px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 10px 12px; background: #111; border-bottom: 2px solid #333; color: #999; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }
        tr:hover { background: #111; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
        .badge-pass { background: #0d3b0d; color: #4caf50; }
        .badge-fail { background: #3b0d0d; color: #f44336; }
        .badge-full { background: #0d2a3b; color: #2196f3; }
        .badge-partial { background: #3b2a0d; color: #ff9800; }
        .badge-zero { background: #3b0d0d; color: #f44336; }
        .amount { font-family: monospace; }
        .hash { font-family: monospace; font-size: 0.75rem; color: #666; cursor: pointer; }
        .hash:hover { color: #999; }
        .stats { display: flex; gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 6px; padding: 16px; min-width: 140px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .stat-label { font-size: 0.75rem; color: #666; margin-top: 4px; }
        .empty { text-align: center; padding: 40px; color: #666; }
        #detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; }
        #detail-content { background: #111; border: 1px solid #333; border-radius: 8px; max-width: 700px; margin: 40px auto; padding: 24px; max-height: 80vh; overflow-y: auto; }
        #detail-content pre { background: #0a0a0a; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 0.8rem; white-space: pre-wrap; }
        .close-btn { float: right; cursor: pointer; color: #999; font-size: 1.2rem; }
        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>
    <h1>SLA-Pay v2 Dashboard</h1>
    <p class="subtitle">Pay by proof, not upfront — Real-time receipt ledger</p>

    <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-value" id="stat-total">0</div><div class="stat-label">Total Requests</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-passed">0</div><div class="stat-label">Validation Pass</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-failed">0</div><div class="stat-label">Validation Fail</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-avg-latency">-</div><div class="stat-label">Avg Latency (ms)</div></div>
    </div>

    <div class="controls">
        <button class="active" data-filter="all">All</button>
        <button data-filter="pass">Pass</button>
        <button data-filter="fail">Fail</button>
        <input type="text" id="gateway-url" value="http://localhost:8000" placeholder="Gateway URL">
        <button onclick="fetchReceipts()">Refresh</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Request ID</th>
                <th>Latency</th>
                <th>Validation</th>
                <th>Payout</th>
                <th>Refund</th>
                <th>Rule</th>
                <th>Receipt Hash</th>
            </tr>
        </thead>
        <tbody id="receipts-body">
            <tr><td colspan="7" class="empty">No receipts yet. Click Refresh or run the demo.</td></tr>
        </tbody>
    </table>

    <div id="detail-modal" onclick="closeDetail(event)">
        <div id="detail-content">
            <span class="close-btn" onclick="document.getElementById('detail-modal').style.display='none'">&times;</span>
            <h3 style="margin-bottom:12px">Receipt Detail</h3>
            <pre id="detail-json"></pre>
        </div>
    </div>

    <script>
        let allReceipts = [];
        let currentFilter = 'all';

        document.querySelectorAll('[data-filter]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderReceipts();
            });
        });

        async function fetchReceipts() {
            const url = document.getElementById('gateway-url').value;
            try {
                const resp = await fetch(`${url}/v1/receipts?limit=100`);
                allReceipts = await resp.json();
                renderReceipts();
            } catch (e) {
                console.error('Failed to fetch receipts:', e);
            }
        }

        function renderReceipts() {
            const tbody = document.getElementById('receipts-body');
            let filtered = allReceipts;

            if (currentFilter === 'pass') filtered = allReceipts.filter(r => r.validation?.overall_pass);
            if (currentFilter === 'fail') filtered = allReceipts.filter(r => !r.validation?.overall_pass);

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">No receipts match filter.</td></tr>';
                updateStats();
                return;
            }

            tbody.innerHTML = filtered.map(r => {
                const vpass = r.validation?.overall_pass;
                const payout = parseInt(r.pricing?.computed_payout || '0');
                const refund = parseInt(r.pricing?.computed_refund || '0');
                const maxP = parseInt(r.pricing?.max_price || '0');
                const latency = r.metrics?.latency_ms ?? '-';
                const rule = r.pricing?.rule_applied || '-';
                const hash = r.hashes?.receipt_hash || '-';
                const shortHash = hash.length > 14 ? hash.slice(0, 8) + '...' + hash.slice(-4) : hash;

                let payoutBadge = 'badge-zero';
                if (payout === maxP && maxP > 0) payoutBadge = 'badge-full';
                else if (payout > 0) payoutBadge = 'badge-partial';

                return `<tr onclick="showDetail('${r.request_id}')" style="cursor:pointer">
                    <td style="font-family:monospace;font-size:0.8rem">${r.request_id}</td>
                    <td>${latency}ms</td>
                    <td><span class="badge ${vpass ? 'badge-pass' : 'badge-fail'}">${vpass ? 'PASS' : 'FAIL'}</span></td>
                    <td class="amount"><span class="badge ${payoutBadge}">${(payout/1000000).toFixed(6)}</span></td>
                    <td class="amount">${(refund/1000000).toFixed(6)}</td>
                    <td>${rule}</td>
                    <td class="hash" title="${hash}">${shortHash}</td>
                </tr>`;
            }).join('');

            updateStats();
        }

        function updateStats() {
            document.getElementById('stat-total').textContent = allReceipts.length;
            const passed = allReceipts.filter(r => r.validation?.overall_pass).length;
            document.getElementById('stat-passed').textContent = passed;
            document.getElementById('stat-failed').textContent = allReceipts.length - passed;
            const latencies = allReceipts.map(r => r.metrics?.latency_ms).filter(l => l != null);
            const avg = latencies.length > 0 ? Math.round(latencies.reduce((a,b) => a+b, 0) / latencies.length) : '-';
            document.getElementById('stat-avg-latency').textContent = avg;
        }

        async function showDetail(requestId) {
            const url = document.getElementById('gateway-url').value;
            try {
                const resp = await fetch(`${url}/v1/receipts/${requestId}`);
                const data = await resp.json();
                document.getElementById('detail-json').textContent = JSON.stringify(data, null, 2);
                document.getElementById('detail-modal').style.display = 'block';
            } catch (e) {
                console.error('Failed to fetch receipt:', e);
            }
        }

        function closeDetail(e) {
            if (e.target.id === 'detail-modal') {
                document.getElementById('detail-modal').style.display = 'none';
            }
        }

        // Auto-fetch on load
        fetchReceipts();
    </script>
</body>
</html>
