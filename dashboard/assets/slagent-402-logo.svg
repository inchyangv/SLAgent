<svg width="560" height="140" viewBox="0 0 560 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SLAgent-402 Logo</title>
  <desc id="desc">Gradient shield mark with check pulse and SLAgent-402 wordmark.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="18" y1="16" x2="126" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D1C2D"/>
      <stop offset="1" stop-color="#102C4D"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="20" y1="18" x2="126" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#64E8FF"/>
      <stop offset="0.55" stop-color="#2AA8FF"/>
      <stop offset="1" stop-color="#61F5C0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="164" y1="26" x2="414" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8F4FF"/>
      <stop offset="1" stop-color="#A6D8FF"/>
    </linearGradient>
    <filter id="softGlow" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="18" y="16" width="108" height="108" rx="26" fill="url(#bgGrad)"/>
  <rect x="18.75" y="16.75" width="106.5" height="106.5" rx="25.25" stroke="url(#lineGrad)" stroke-opacity="0.55" stroke-width="1.5"/>

  <path d="M39 85C50 60 71 52 88 58C98 62 103 70 105 80" stroke="#264E79" stroke-width="6" stroke-linecap="round"/>
  <path d="M39 84.5C50.5 59.5 70.8 51.8 87.5 57.8C97.2 61.2 102.7 69.8 105 80.2" stroke="url(#lineGrad)" stroke-width="3.2" stroke-linecap="round" filter="url(#softGlow)"/>
  <path d="M54 75.5L69 89L95 59" stroke="url(#lineGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>

  <circle cx="72" cy="71" r="33" stroke="#17395D" stroke-width="1.5" stroke-dasharray="4 8"/>
  <circle cx="72" cy="71" r="33" stroke="url(#lineGrad)" stroke-width="1.5" stroke-dasharray="4 8" stroke-dashoffset="-18" opacity="0.62"/>

  <text x="152" y="74" fill="url(#textGrad)" font-size="42" font-family="'Sora', 'Segoe UI', Arial, sans-serif" font-weight="700" letter-spacing="1">SLAGENT-402</text>
  <text x="162" y="101" fill="#66A5D8" font-size="16" font-family="'Sora', 'Segoe UI', Arial, sans-serif" letter-spacing="2.8">PAY BY PROOF</text>
</svg>
